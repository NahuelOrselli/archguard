name: archguard

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  check-architecture:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run archguard
        id: archguard
        continue-on-error: true
        run: |
          if [ -f ".archguard-baseline.json" ]; then
            BASELINE_ARG="--baseline .archguard-baseline.json"
          else
            BASELINE_ARG=""
          fi

          node tools/archguard/index.js check \
            --changed-only \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            $BASELINE_ARG \
            --out archguard-report.md

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: archguard-report
          path: archguard-report.md

      - name: Comment report in PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const marker = '<!-- archguard-report -->';
            const report = fs.readFileSync('archguard-report.md', 'utf8');
            const body = `${marker}\n${report}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const existing = comments.data.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

      - name: Fail workflow on violations
        if: steps.archguard.outcome == 'failure'
        run: |
          echo "archguard found architecture violations"
          exit 1
